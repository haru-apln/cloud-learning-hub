<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 280px;
        font-family: "Segoe UI", sans-serif;
        padding: 15px;
      }
      h3 {
        margin-bottom: 10px;
        color: #1f73b7;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
      }
      h4 {
        margin: 0 0 8px 0;
        font-size: 14px;
        color: #333;
      }
      .course-card {
        margin-bottom: 15px;
        border-bottom: 1px dashed #eee;
        padding-bottom: 10px;
      }
      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 5px;
      }
      .course-link {
        font-size: 13px;
        color: #333;
        text-decoration: none;
        font-weight: bold;
      }
      .course-link:hover {
        color: #1f73b7;
        text-decoration: underline;
      }
      .delete-btn {
        color: #dc3545;
        cursor: pointer;
        font-size: 11px;
        font-weight: bold;
        padding: 2px 5px;
      }
      .delete-btn:hover {
        background: #fff1f1;
        border-radius: 3px;
      }
      .progress-bar {
        background: #e0e0e0;
        border-radius: 10px;
        height: 12px;
        overflow: hidden;
        margin-bottom: 5px;
      }
      .fill {
        height: 100%;
        width: 0%;
        transition: width 0.8s ease-in-out;
        background: #4caf50;
      }
      .percent-text {
        font-size: 11px;
        font-weight: bold;
        color: #555;
      }
      .add-form {
        background: #f9f9f9;
        padding: 10px;
        border-radius: 8px;
        margin-top: 15px;
        border: 1px solid #ddd;
      }
      input {
        width: 90%;
        padding: 5px;
        margin-bottom: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 12px;
      }
      button {
        width: 100%;
        background: #1f73b7;
        color: white;
        border: none;
        padding: 6px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background: #155a91;
      }
      .platform-label {
        display: block;
        font-size: 10px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 2px;
      }
      .course-card {
        margin-bottom: 18px;
        border-bottom: 1px dashed #eee;
        padding-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <h3>Learning Dashboard</h3>

    <div id="dynamic-trackers"></div>

    <div class="add-form">
      <h4>+ Add Course Tracker</h4>
      <input
        type="text"
        id="new-name"
        placeholder="Name (e.g. AWS Solutions)"
      />
      <input
        type="text"
        id="new-url"
        placeholder="Domain (e.g. coursera.org)"
      />
      <button id="add-btn">Add to Dashboard</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
