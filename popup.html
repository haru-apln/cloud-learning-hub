<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cloud Learning HUD</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h3>Learning Dashboard</h3>
      <button id="theme-toggle">🌙</button>
    </div>

    <div id="dynamic-trackers"></div>

    <div class="add-form">
      <h4>+ Add Course Tracker</h4>
      <input
        type="text"
        id="new-name"
        placeholder="Name (e.g. AWS Solutions)"
      />
      <input
        type="text"
        id="new-url"
        placeholder="Domain (e.g. coursera.org)"
      />
      <button id="add-btn">Add to Dashboard</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
